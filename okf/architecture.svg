<text x="340" y="38" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">React frontend</text>
<text x="340" y="54" text-anchor="middle" font-size="12" fill="#534AB7">Vite, localhost:5173</text>
<line x1="340" y1="64" x2="340" y2="94" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="270" y="94" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
