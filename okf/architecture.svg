<svg width="680" height="634" viewBox="0 0 680 634" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img">
<title>Bowling architecture</title>
<desc>A React (Vite) frontend on localhost:5173 sends HTTP requests through a JWT auth filter into a Spring Boot application with four REST controllers (Auth, Bowler, Session, Score), each backed by a matching service (User, Bowler, Session, Score), which use JPA repositories to read and write a MariaDB database (H2 in tests).</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

