<text x="70" y="207" font-size="12" fill="#444441">Java 21 / Spring Boot 3.3.5</text>

<rect x="90" y="222" width="500" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">JWT auth filter</text>
<text x="340" y="254" text-anchor="middle" font-size="12" fill="#444441">Validates bearer token, sets security context</text>
