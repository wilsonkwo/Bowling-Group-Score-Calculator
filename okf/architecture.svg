<text x="340" y="128" text-anchor="middle" font-size="12" fill="#444441">HTTP</text>
<line x1="340" y1="138" x2="340" y2="222" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

