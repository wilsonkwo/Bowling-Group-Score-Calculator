# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/bowling?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ── JWT ──────────────────────────────────────────────────
# Replace with a strong secret (min 32 chars) in production; use env var APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-random-secret-32chars}
app.jwt.expiration-ms=86400000

# ── Logging ──────────────────────────────────────────────
logging.level.sg.sports.bowling=debug
spring.output.ansi.enabled=DETECT
